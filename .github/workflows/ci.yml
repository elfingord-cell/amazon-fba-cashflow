name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (vite)
        run: npm run build
      - name: Parity-Suite (Engine + V2)
        run: npm run test:parity
      - name: Guard-Test (Shared-Helper-Duplikate)
        run: node --test tests/v2/shared-helpers.guard.test.mjs
